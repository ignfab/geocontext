<svg width="512" height="512" viewBox="0 0 224 224" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GeoContext hexagon icon</title>
  <desc id="desc">Icône GeoContext isolée : tuile cartographique hexagonale avec bulle de contexte spatial, pin géographique et nœuds MCP.</desc>
